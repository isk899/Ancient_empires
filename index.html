let G; 

class Game {
  constructor(){
    this.canvas=document.getElementById('game-canvas');
    this.renderer=new Renderer(this.canvas);
    this.world=null;
    this.player=null;
    this.selection=null;
    this._raf=null;
    this._last=0;
    this.buildMode={active:false,type:null,mx:null,my:null};
    this._drag={active:false,sx:0,sy:0,cx:0,cy:0};
    this._selDrag=null;
    this._canvasRect=null;
    this._keys={};
    this._mouseScreenX=null;
    this._mouseScreenY=null;
    this._moveMarkers=[];
    this._bindInput();
  }

  start(civId){
    const civ=CIV[civId];
    this.player={
      civ,
      res:new Resources(200,200,100+(civ===CIV.egypt?100:0),100),
      popCur:0,popMax:0,
    };
    // Pick a random AI civ
    const aiCivKeys=Object.keys(CIV);
    const aiCivId=aiCivKeys[Math.floor(Math.random()*aiCivKeys.length)];
    this.aiPlayer={
      civ:CIV[aiCivId],
      res:new Resources(300,300,150,150),
      popCur:0,popMax:0,
    };
    this.gameOver=false;
    this.world=new World();
    generateMap(this.world);
    this._spawnBase();
    this._spawnAIBase();
    this._calcPop();
    this.ai=new AI(this.world,this.aiPlayer,this.player);
    this._initHUD();
    this._last=performance.now();
    this._loop(this._last);

    document.getElementById('end-btn').onclick=()=>{
      this.stop();
      document.getElementById('endscreen').classList.remove('show');
      document.getElementById('screen-game').classList.remove('active');
      document.getElementById('screen-menu').classList.remove('hidden');
      window.location.reload();
    };
  }

  _spawnBase(){
    const civ=this.player.civ;
    // Player base: upper-left quadrant
    const px=Math.floor(MAP_COLS*0.15);
    const py=Math.floor(MAP_ROWS*0.15);
    // Clear area
    for(let r=py-1;r<py+5;r++)for(let c=px-1;c<px+6;c++)
      if(r>=0&&c>=0&&r<MAP_ROWS&&c<MAP_COLS)this.world.occupied[r*MAP_COLS+c]=0;
    const tc=new Building({
      x:px,y:py,subtype:'town_center',
      owner:'player',hpMult:civ.hpMult,buildSpeedMult:civ.buildSpeedMult,
    });
    this.world.add(tc);
    this.world.occupy(tc.x,tc.y,tc.tw,tc.th);

    for(let i=0;i<3;i++){
      const angle=(i/3)*Math.PI*2-Math.PI/2; // evenly spaced around TC
      const radius=tc.pw*0.6+TILE;
      const v=new Unit({
        x:tc.x+tc.tw+1,y:tc.y+i,
        speedMult:civ.speedMult,buildSpeedMult:civ.buildSpeedMult,
        owner:'player',
      });
      v.px=tc.cx+Math.cos(angle)*radius-14;
      v.py=tc.cy+Math.sin(angle)*radius-14;
      this.world.add(v);
    }
    const vcx=tc.cx-this.renderer.W/2;
    const vcy=tc.cy-this.renderer.H/2;
    this.world.camera={x:Math.max(0,Math.min(MAP_W-this.renderer.W,vcx)),
                       y:Math.max(0,Math.min(MAP_H-this.renderer.H,vcy))};
  }

  _spawnAIBase(){
    const civ=this.aiPlayer.civ;
    // AI base: lower-right quadrant
    const ax=Math.floor(MAP_COLS*0.78);
    const ay=Math.floor(MAP_ROWS*0.78);
    for(let r=ay-1;r<ay+5;r++)for(let c=ax-1;c<ax+6;c++)
      if(r>=0&&c>=0&&r<MAP_ROWS&&c<MAP_COLS)this.world.occupied[r*MAP_COLS+c]=0;
    const tc=new Building({
      x:ax,y:ay,subtype:'town_center',
      owner:'ai',hpMult:civ.hpMult,buildSpeedMult:civ.buildSpeedMult,
    });
    this.world.add(tc);
    this.world.occupy(tc.x,tc.y,tc.tw,tc.th);

    for(let i=0;i<3;i++){
      const angle=(i/3)*Math.PI*2+Math.PI/2; // evenly spaced around AI TC
      const radius=tc.pw*0.6+TILE;
      const v=new Unit({
        x:tc.x-2,y:tc.y+i,
        speedMult:civ.speedMult,buildSpeedMult:civ.buildSpeedMult,
        owner:'ai',
      });
      v.px=tc.cx+Math.cos(angle)*radius-14;
      v.py=tc.cy+Math.sin(angle)*radius-14;
      this.world.add(v);
    }
  }

  _checkVictory(){
    if(this.gameOver)return;
    const playerTC=this.world.entities.find(e=>e.type==='building'&&e.subtype==='town_center'&&e.owner==='player');
    const aiTC=this.world.entities.find(e=>e.type==='building'&&e.subtype==='town_center'&&e.owner==='ai');
    if(!aiTC||aiTC.hp<=0){
      this._endGame(true);
    } else if(!playerTC||playerTC.hp<=0){
      this._endGame(false);
    }
  }

  _endGame(victory){
    this.gameOver=true;
    this.stop();
    SFX.play(victory?'victory':'defeat');
    const es=document.getElementById('endscreen');
    const title=document.getElementById('end-title');
    const sub=document.getElementById('end-sub');
    title.className=victory?'victory':'defeat';
    title.textContent=victory?'ПОБЕДА':'ПОРАЖЕНИЕ';
    sub.textContent=victory?'Ратуша врага пала. Империя процветает.':'Ваша ратуша уничтожена. Империя пала.';
    es.classList.add('show');
  }

  _calcPop(){
    let max=0;
    this.world.entities.forEach(e=>{if(e.type==='building'&&e.owner==='player')max+=e.popProvided;});
    this.player.popMax=max;
    this.player.popCur=this.world.entities.filter(e=>e.type==='unit'&&e.owner==='player').length;
  }

  _initHUD(){
    const c=this.player.civ.color;
    document.getElementById('hud-dot').style.background=c;
    document.getElementById('hud-dot').style.boxShadow=`0 0 5px ${c}`;
    document.getElementById('hud-civ-name').textContent=this.player.civ.name;
  }

  _updateHUD(){
    const r=this.player.res;
    document.getElementById('r-wood').textContent=Math.floor(r.wood);
    document.getElementById('r-food').textContent=Math.floor(r.food);
    document.getElementById('r-gold').textContent=Math.floor(r.gold);
    document.getElementById('r-stone').textContent=Math.floor(r.stone);
    document.getElementById('p-cur').textContent=this.player.popCur;
    document.getElementById('p-max').textContent=this.player.popMax;
  }

  _updateSelInfo(){
    const e=this.selection;
    // Count all selected player units
    const selectedUnits=this.world?this.world.entities.filter(u=>u.type==='unit'&&u.selected&&u.owner==='player'):[];
    const pcanvas=document.getElementById('portrait-canvas');
    drawPortrait(pcanvas,e,this.player);

    const nameEl=document.getElementById('sel-name');
    const descEl=document.getElementById('sel-desc');
    const hpWrap=document.getElementById('sel-hp-wrap');
    const hpFill=document.getElementById('sel-hp-fill');
    const portLabel=document.getElementById('sel-portrait-label');

    if(!e){
      nameEl.textContent='—';
      descEl.textContent='Кликните на юнита или здание';
      hpWrap.style.display='none';
      document.getElementById('cmd-panel').innerHTML='';
      if(portLabel)portLabel.textContent='';
      return;
    }

    if(portLabel){
      portLabel.textContent=e.type==='unit'?e.subtype==='warrior'?'ВОИН':'КРЕСТЬЯНИН':
        e.type==='building'?'ЗДАНИЕ':e.type==='resource'?'РЕСУРС':'';
    }

    // If multiple units selected show group info
    if(selectedUnits.length>1){
      nameEl.textContent=`Группа: ${selectedUnits.length} юнит${selectedUnits.length<5?'а':'ов'}`;
      hpWrap.style.display='block';
      const avgHpR=selectedUnits.reduce((a,u)=>a+u.hp/u.maxHp,0)/selectedUnits.length;
      hpFill.style.width=(avgHpR*100)+'%';
      hpFill.style.background=avgHpR>0.6?'#4cde5a':avgHpR>0.3?'#e8c23a':'#e84a4a';
      const vils=selectedUnits.filter(u=>u.subtype==='villager').length;
      const wars=selectedUnits.filter(u=>u.subtype==='warrior').length;
      let desc='';
      if(vils>0)desc+=`Крестьян: ${vils}  `;
      if(wars>0)desc+=`Воинов: ${wars}`;
      descEl.textContent=desc;
      buildCmdPanel(e,this);
      return;
    }

    nameEl.textContent=e.label||e.subtype;
    hpWrap.style.display='block';
    const hpr=(e.hp/e.maxHp)*100;
    hpFill.style.width=hpr+'%';
    hpFill.style.background=hpr>60?'#4cde5a':hpr>30?'#e8c23a':'#e84a4a';

    let desc='';
    if(e.type==='unit'){
      desc=`HP: ${Math.ceil(e.hp)}/${e.maxHp} · Состояние: ${e.state}`;
      if(e.carrying.amount>0)desc+=`\nНесёт: ${e.carrying.amount} ${e.carrying.type}`;
    } else if(e.type==='building'){
      desc=`HP: ${Math.ceil(e.hp)}/${e.maxHp}`;
      if(!e.ready)desc+=` · Строится: ${Math.round(e.buildProgress*100)}%`;
      if(e.popProvided)desc+=` · Жильцов: +${e.popProvided}`;
      if(e.trainQueue&&e.trainQueue.length>0)desc+=` · Обучение: ${Math.ceil(e.trainTimer)}с (в очереди: ${e.trainQueue.length})`;
    } else if(e.type==='resource'){
      desc=`Осталось: ${Math.ceil(e.amount)} / ${e.maxAmount}`;
    }
    descEl.textContent=desc;
    buildCmdPanel(e,this);
  }

  enterBuildMode(btype){
    const def=BUILDING_DEFS[btype];
    if(!this.player.res.canAfford(def.cost)){return;}
    this.buildMode={active:true,type:btype,mx:null,my:null};
    document.getElementById('build-hint').style.display='block';
    this.canvas.style.cursor='crosshair';
  }
  exitBuildMode(){
    this.buildMode={active:false,type:null,mx:null,my:null};
    document.getElementById('build-hint').style.display='none';
    this.canvas.style.cursor='default';
  }
  placeBuild(mx,my){
    const cam=this.world.camera;
    const def=BUILDING_DEFS[this.buildMode.type];
    const tx=Math.floor((mx+cam.x)/TILE);
    const ty=Math.floor((my+cam.y)/TILE);
    if(!this.world.canPlace(tx,ty,def.w,def.h))return;
    if(!this.player.res.spend(def.cost))return;

    const b=new Building({
      x:tx,y:ty,subtype:this.buildMode.type,
      owner:'player',
      hpMult:this.player.civ.hpMult,
      buildSpeedMult:this.player.civ.buildSpeedMult,
    });
    this.world.add(b);
    this.world.occupy(tx,ty,def.w,def.h);

    const builders=this.world.entities.filter(e=>e.type==='unit'&&e.selected&&e.owner==='player');
    if(builders.length){builders[0].assignBuild(b);}

    this.exitBuildMode();
    this._calcPop();
  }

  _bindInput(){
    this.canvas.addEventListener('mousedown',e=>this._onMouseDown(e));
    this.canvas.addEventListener('mouseup',  e=>this._onMouseUp(e));
    this.canvas.addEventListener('contextmenu',e=>{e.preventDefault();this._onRightClick(e);});

    // Track mouse globally so edge-scroll works even when cursor is over the bottom panel
    window.addEventListener('mousemove',e=>{
      const r=this.canvas.getBoundingClientRect();
      // Canvas-relative coords (can exceed canvas bounds when over UI panels)
      this._mouseScreenX=e.clientX-r.left;
      this._mouseScreenY=e.clientY-r.top;
      // Only do canvas-specific interactions when mouse is inside the canvas
      if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
        this._onMouseMove(e);
      } else {
        // Outside canvas: hide tooltip, update build preview position
        if(this.buildMode.active){
          this.buildMode.mx=this._mouseScreenX;
          this.buildMode.my=this._mouseScreenY;
        }
        document.getElementById('tooltip').style.display='none';
        // Continue drag-scroll if active
        if(this._drag.active){
          const{sx,sy}={sx:this._mouseScreenX,sy:this._mouseScreenY};
          const cam=this.world.camera;
          cam.x=Math.max(0,Math.min(MAP_W-this.renderer.W,this._drag.cx+(this._drag.sx-sx)));
          cam.y=Math.max(0,Math.min(MAP_H-this.renderer.H,this._drag.cy+(this._drag.sy-sy)));
        }
      }
    });

    window.addEventListener('keydown',e=>{
      this._keys[e.code]=true;
      if(e.code==='Escape'){
        if(SETTINGS.isPaused) this._closeIngameMenu();
        else this.exitBuildMode();
      }
    });
    window.addEventListener('keyup',e=>{this._keys[e.code]=false;});

    this.canvas.addEventListener('click',e=>{
      const r=this.canvas.getBoundingClientRect();
      const sx=e.clientX-r.left, sy=e.clientY-r.top;
      const W=this.renderer.W,H=this.renderer.H;
      const mw=120,mh=80,mmx=W-mw-8,mmy=H-mh-8;
      if(sx>=mmx&&sx<=mmx+mw&&sy>=mmy&&sy<=mmy+mh){
        const wx=(sx-mmx)/mw*MAP_W;
        const wy=(sy-mmy)/mh*MAP_H;
        this.world.camera.x=Math.max(0,Math.min(MAP_W-W,wx-W/2));
        this.world.camera.y=Math.max(0,Math.min(MAP_H-H,wy-H/2));
      }
    });
  }

  _onMouseDown(e){
    if(e.button!==0)return;
    const{sx,sy}=this._screenPos(e);
    if(this.buildMode.active){this.placeBuild(sx,sy);return;}
    if(this._keys['Space']||e.button===1){
      this._drag={active:true,sx,sy,cx:this.world.camera.x,cy:this.world.camera.y};
      return;
    }
    // Begin potential drag selection
    this._selDrag={
      active:true,
      startSx:sx,startSy:sy,
      curSx:sx,curSy:sy,
      moved:false,
      clientX:e.clientX,clientY:e.clientY,
    };
    // Store canvas rect for later use
    this._canvasRect=this.canvas.getBoundingClientRect();
  }

  _onMouseMove(e){
    const{sx,sy}=this._screenPos(e);
    this._mouseScreenX=sx;
    this._mouseScreenY=sy;
    if(this.buildMode.active){this.buildMode.mx=sx;this.buildMode.my=sy;return;}
    if(this._drag.active){
      const cam=this.world.camera;
      cam.x=Math.max(0,Math.min(MAP_W-this.renderer.W,this._drag.cx+(this._drag.sx-sx)));
      cam.y=Math.max(0,Math.min(MAP_H-this.renderer.H,this._drag.cy+(this._drag.sy-sy)));
    }

    // Handle drag selection box
    if(this._selDrag&&this._selDrag.active){
      const dist=Math.hypot(sx-this._selDrag.startSx,sy-this._selDrag.startSy);
      if(dist>5){
        this._selDrag.moved=true;
        this._selDrag.curSx=sx;this._selDrag.curSy=sy;
        // Draw selection box using fixed position relative to viewport
        const r=this._canvasRect;
        const x1=Math.min(this._selDrag.startSx,sx)+r.left;
        const y1=Math.min(this._selDrag.startSy,sy)+r.top;
        const x2=Math.max(this._selDrag.startSx,sx)+r.left;
        const y2=Math.max(this._selDrag.startSy,sy)+r.top;
        const box=document.getElementById('sel-box');
        box.style.display='block';
        box.style.left=x1+'px';box.style.top=y1+'px';
        box.style.width=(x2-x1)+'px';box.style.height=(y2-y1)+'px';
      }
    }

    const{wx,wy}=this._worldPos(sx,sy);
    const hit=this.world.entityAt(wx,wy);
    const tt=document.getElementById('tooltip');
    if(hit){
      let txt=hit.label||hit.subtype;
      if(hit.type==='resource')txt+=` · ${Math.ceil(hit.amount)} ${hit.resType}`;
      if(hit.type==='building'&&!hit.ready)txt+=` [строится ${Math.round(hit.buildProgress*100)}%]`;
      tt.style.display='block';
      tt.style.left=(e.clientX+12)+'px';
      tt.style.top=(e.clientY-8)+'px';
      tt.textContent=txt;
    }else{
      tt.style.display='none';
    }
  }

  _onMouseUp(e){
    this._drag.active=false;
    // Handle end of drag selection
    if(this._selDrag&&this._selDrag.active){
      document.getElementById('sel-box').style.display='none';
      if(this._selDrag.moved){
        // Select all player units inside the drag rect
        const x1=Math.min(this._selDrag.startSx,this._selDrag.curSx);
        const y1=Math.min(this._selDrag.startSy,this._selDrag.curSy);
        const x2=Math.max(this._selDrag.startSx,this._selDrag.curSx);
        const y2=Math.max(this._selDrag.startSy,this._selDrag.curSy);
        const cam=this.world.camera;
        // Convert screen rect to world rect
        const wx1=x1+cam.x,wy1=y1+cam.y;
        const wx2=x2+cam.x,wy2=y2+cam.y;
        // Deselect all
        this.world.entities.forEach(e=>e.selected=false);
        let anySelected=false;
        // Select player units whose center is inside the rect
        for(const e of this.world.entities){
          if(e.type!=='unit'||e.owner!=='player')continue;
          if(e.cx>=wx1&&e.cx<=wx2&&e.cy>=wy1&&e.cy<=wy2){
            e.selected=true;anySelected=true;
          }
        }
        if(anySelected){
          // Set selection to first selected unit for info panel
          this.selection=this.world.entities.find(e=>e.type==='unit'&&e.selected&&e.owner==='player')||null;
          SFX.play('select_unit');
        } else {
          this.selection=null;
        }
        this._updateSelInfo();
      } else {
        // It was a click, not a drag — normal select
        const{wx,wy}=this._worldPos(this._selDrag.startSx,this._selDrag.startSy);
        this._select(wx,wy);
      }
      this._selDrag=null;
    }
  }

  _onRightClick(e){
    const{sx,sy}=this._screenPos(e);
    const{wx,wy}=this._worldPos(sx,sy);
    if(this.buildMode.active){this.exitBuildMode();return;}

    const selected=this.world.entities.filter(u=>u.type==='unit'&&u.selected&&u.owner==='player');
    if(!selected.length)return;

    const hit=this.world.entityAt(wx,wy);
    if(hit&&hit.type==='resource'&&!hit.depleted){
      selected.forEach(u=>u.assignGather(hit));
      SFX.play('select_resource');
      return;
    }
    if(hit&&hit.type==='building'&&!hit.ready&&hit.owner==='player'){
      selected.forEach(u=>u.assignBuild(hit));
      SFX.play('build');
      return;
    }
    // Right-click on enemy unit or building → attack it
    if(hit&&hit.owner==='ai'){
      selected.filter(u=>u.subtype==='warrior').forEach(u=>u.attackMove(hit));
      selected.filter(u=>u.subtype==='villager').forEach((u,i)=>{
        u.moveTo(wx+(i%3)*20-20,wy+Math.floor(i/3)*20);
        u.targetNode=null;u.targetBuilding=null;
      });
      SFX.play('move');
      this._moveMarkers.push({wx,wy,life:0.85,maxLife:0.85});
      return;
    }
    SFX.play('move');
    selected.forEach((u,i)=>{
      u.moveTo(wx+(i%3)*20-20, wy+Math.floor(i/3)*20);
      u.targetNode=null;
      u.targetBuilding=null;
    });
    this._moveMarkers.push({wx,wy,life:0.85,maxLife:0.85});
  }

  _select(wx,wy){
    const hit=this.world.entityAt(wx,wy);
    this.world.entities.forEach(e=>e.selected=false);
    if(hit){
      hit.selected=true;this.selection=hit;
      if(hit.type==='unit') SFX.play('select_unit');
      else if(hit.type==='building') SFX.play('select_building');
      else if(hit.type==='resource') SFX.play('select_resource');
    }
    else{this.selection=null;}
    this._updateSelInfo();
  }

  _screenPos(e){
    const r=this.canvas.getBoundingClientRect();
    return{sx:e.clientX-r.left,sy:e.clientY-r.top};
  }
  _worldPos(sx,sy){
    const cam=this.world.camera;
    return{wx:sx+cam.x,wy:sy+cam.y};
  }

  _loop(ts){
    const dt=Math.min((ts-this._last)/1000,0.1);
    this._last=ts;
    this._update(dt);
    this.renderer.render(this.world,this.player,this.selection,this.buildMode,this._moveMarkers);
    this._raf=requestAnimationFrame(t=>this._loop(t));
  }

  _update(dt){
    if(this.gameOver||SETTINGS.isPaused)return;
    const spd=350*dt*SETTINGS.scrollSensitivity;
    const cam=this.world.camera;
    const W=this.renderer.W,H=this.renderer.H;
    if(this._keys['KeyA']||this._keys['ArrowLeft']) cam.x=Math.max(0,cam.x-spd);
    if(this._keys['KeyD']||this._keys['ArrowRight'])cam.x=Math.min(MAP_W-W,cam.x+spd);
    if(this._keys['KeyW']||this._keys['ArrowUp'])   cam.y=Math.max(0,cam.y-spd);
    if(this._keys['KeyS']||this._keys['ArrowDown']) cam.y=Math.min(MAP_H-H,cam.y+spd);

    // AoE-style edge scrolling — works even when mouse is over bottom panel
    if(this._mouseScreenX!==null&&this._mouseScreenY!==null&&!this._drag.active){
      const EDGE=60;
      const eSpd=280*dt*SETTINGS.scrollSensitivity;
      const mx=this._mouseScreenX, my=this._mouseScreenY;
      // Extended height: canvas + bottom panel (140px) so scroll works when over panel
      const PANEL_H=140;
      if(mx<EDGE)              cam.x=Math.max(0,      cam.x-eSpd*Math.min(1,(1-mx/EDGE)));
      if(mx>W-EDGE&&mx<=W)    cam.x=Math.min(MAP_W-W,cam.x+eSpd*Math.min(1,(1-(W-mx)/EDGE)));
      if(my<EDGE)              cam.y=Math.max(0,      cam.y-eSpd*Math.min(1,(1-my/EDGE)));
      // Bottom edge scroll: activates approaching canvas bottom, continues into panel
      if(my>H-EDGE)            cam.y=Math.min(MAP_H-H,cam.y+eSpd*Math.min(1.5,Math.max(0,(my-(H-EDGE))/EDGE)));
    }

    if(this.buildMode.mx!==null){
      const m=this.buildMode;
      const edge=30;
      if(m.mx<edge)cam.x=Math.max(0,cam.x-spd*1.5);
      if(m.mx>W-edge)cam.x=Math.min(MAP_W-W,cam.x+spd*1.5);
      if(m.my<edge)cam.y=Math.max(0,cam.y-spd*1.5);
      if(m.my>H-edge)cam.y=Math.min(MAP_H-H,cam.y+spd*1.5);
    }

    // Update move markers
    this._moveMarkers=this._moveMarkers.filter(m=>m.life>0);
    this._moveMarkers.forEach(m=>m.life-=dt);

    this.world.update(dt);
    _separateUnits();

    // Remove dead buildings (hp <= 0)
    const deadBuildings=this.world.entities.filter(e=>e.type==='building'&&e.hp<=0);
    deadBuildings.forEach(b=>{
      if(this.selection===b)this.selection=null;
      this.world.remove(b.id);
    });
    // Remove dead units (hp <= 0)
    const deadUnits=this.world.entities.filter(e=>e.type==='unit'&&e.hp<=0);
    deadUnits.forEach(u=>{
      if(this.selection===u)this.selection=null;
      this.world.remove(u.id);
    });

    if(this.ai)this.ai.update(dt);
    this._calcPop();
    this._updateHUD();
    if(this.selection)this._updateSelInfo();
    this._checkVictory();
  }

  stop(){if(this._raf)cancelAnimationFrame(this._raf);}

  _openIngameMenu(){
    SETTINGS.isPaused=true;
    document.getElementById('ingame-menu').classList.remove('hidden');
  }
  _closeIngameMenu(){
    SETTINGS.isPaused=false;
    document.getElementById('ingame-menu').classList.add('hidden');
    this._last=performance.now(); // prevent dt spike after unpause
  }
}

// ── MENU KNIGHT RENDERER ──
function startMenuCanvas(){
  const canvas=document.getElementById('menu-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let t=0;
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);

  function drawKnight(ctx,cx,cy,scale,t){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.scale(scale,scale);

    const breathe=Math.sin(t*0.8)*2;
    const cloakSwing=Math.sin(t*0.6)*4;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.ellipse(0,110,55,12,0,0,Math.PI*2);ctx.fill();

    // Cloak back
    ctx.fillStyle='#0a0a0f';
    ctx.beginPath();
    ctx.moveTo(-30,20);
    ctx.bezierCurveTo(-45+cloakSwing,60,-50+cloakSwing,95,-35+cloakSwing,115);
    ctx.lineTo(35-cloakSwing,115);
    ctx.bezierCurveTo(50-cloakSwing,95,45-cloakSwing,60,30,20);
    ctx.closePath();ctx.fill();
    // Cloak highlight
    ctx.fillStyle='rgba(200,168,75,0.06)';
    ctx.beginPath();
    ctx.moveTo(-30,20);ctx.bezierCurveTo(-40+cloakSwing,50,-38+cloakSwing,85,-25+cloakSwing,112);
    ctx.lineTo(-15+cloakSwing,112);ctx.bezierCurveTo(-25+cloakSwing,85,-28+cloakSwing,50,-20,20);
    ctx.closePath();ctx.fill();

    // Legs
    const legL=-12, legR=12;
    // Left leg
    ctx.fillStyle='#2a2a35';
    ctx.fillRect(legL-10,60+breathe,20,30);
    ctx.fillStyle='#3a3a48';
    ctx.fillRect(legL-8,58+breathe,16,8);
    ctx.fillRect(legL-9,87+breathe,18,10); // knee armor
    // Greaves
    ctx.fillStyle='#222230';
    ctx.fillRect(legL-9,97+breathe,18,18);
    ctx.fillStyle='#333345';ctx.fillRect(legL-9,97+breathe,18,4);
    // Boots
    ctx.fillStyle='#111115';
    ctx.fillRect(legL-10,112+breathe,20,6);ctx.fillRect(legL-12,114+breathe,24,4);

    // Right leg
    ctx.fillStyle='#2a2a35';
    ctx.fillRect(legR-10,60+breathe,20,30);
    ctx.fillStyle='#3a3a48';
    ctx.fillRect(legR-8,58+breathe,16,8);
    ctx.fillRect(legR-9,87+breathe,18,10);
    ctx.fillStyle='#222230';
    ctx.fillRect(legR-9,97+breathe,18,18);
    ctx.fillStyle='#333345';ctx.fillRect(legR-9,97+breathe,18,4);
    ctx.fillStyle='#111115';
    ctx.fillRect(legR-10,112+breathe,20,6);ctx.fillRect(legR-12,114+breathe,24,4);

    // Tabard (surcoat)
    ctx.fillStyle='#0f0f14';
    ctx.fillRect(-22,20+breathe,44,42);
    // Tabard accent stripe
    ctx.fillStyle='rgba(200,168,75,0.15)';
    ctx.fillRect(-4,22+breathe,8,38);

    // Body armour (breastplate)
    const bpGrad=ctx.createLinearGradient(-20,0,20,0);
    bpGrad.addColorStop(0,'#1a1a22');bpGrad.addColorStop(0.3,'#35354a');bpGrad.addColorStop(0.5,'#45455e');bpGrad.addColorStop(0.7,'#35354a');bpGrad.addColorStop(1,'#1a1a22');
    ctx.fillStyle=bpGrad;
    ctx.beginPath();
    ctx.moveTo(-22,20+breathe);ctx.lineTo(-24,55+breathe);ctx.lineTo(24,55+breathe);ctx.lineTo(22,20+breathe);ctx.closePath();ctx.fill();
    // Breastplate ridge
    ctx.strokeStyle='rgba(200,168,75,0.3)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,22+breathe);ctx.lineTo(0,53+breathe);ctx.stroke();
    // Pauldrons (shoulder armor)
    const sGrad=ctx.createRadialGradient(-26,18,2,-26,18,18);
    sGrad.addColorStop(0,'#45455e');sGrad.addColorStop(1,'#1a1a22');
    ctx.fillStyle=sGrad;
    ctx.beginPath();ctx.ellipse(-26,18+breathe,18,10,0.3,0,Math.PI*2);ctx.fill();
    const sGrad2=ctx.createRadialGradient(26,18,2,26,18,18);
    sGrad2.addColorStop(0,'#45455e');sGrad2.addColorStop(1,'#1a1a22');
    ctx.fillStyle=sGrad2;
    ctx.beginPath();ctx.ellipse(26,18+breathe,18,10,-0.3,0,Math.PI*2);ctx.fill();
    // Arms
    ctx.fillStyle='#2a2a38';
    ctx.fillRect(-38,20+breathe,16,28);ctx.fillRect(22,20+breathe,16,28);
    ctx.fillStyle='#35354a';
    ctx.fillRect(-36,20+breathe,8,6);ctx.fillRect(22,20+breathe,8,6); // vambrace top
    ctx.fillRect(-38,40+breathe,16,6);ctx.fillRect(22,40+breathe,16,6); // elbow
    // Gauntlets
    ctx.fillStyle='#1f1f2a';
    ctx.fillRect(-40,48+breathe,20,12);ctx.fillRect(20,48+breathe,20,12);
    ctx.fillStyle='#2a2a38';
    for(let i=0;i<4;i++){ctx.fillRect(-39+i*5,48+breathe,3,12);ctx.fillRect(21+i*5,48+breathe,3,12);}

    // Shield (left arm)
    const swordSwing=Math.sin(t*0.5)*3;
    ctx.save();ctx.translate(-60,28+swordSwing+breathe);ctx.rotate(-0.1+swordSwing*0.01);
    const shGrad=ctx.createLinearGradient(-18,0,18,0);

    ctx.fillStyle=shGrad;
    ctx.beginPath();
    ctx.moveTo(0,-28);ctx.bezierCurveTo(20,-22,22,10,0,28);ctx.bezierCurveTo(-22,10,-20,-22,0,-28);
    ctx.fill();
    // Shield boss
    ctx.fillStyle='rgba(200,168,75,0.8)';ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,220,100,0.9)';ctx.beginPath();ctx.arc(-2,-2,3,0,Math.PI*2);ctx.fill();
    // Shield trim
    ctx.strokeStyle='rgba(200,168,75,0.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-28);ctx.bezierCurveTo(20,-22,22,10,0,28);ctx.bezierCurveTo(-22,10,-20,-22,0,-28);ctx.stroke();
    ctx.restore();

    // Sword (right arm extended)
    ctx.save();ctx.translate(52,20+breathe-swordSwing);ctx.rotate(0.15-swordSwing*0.02);
    // Blade
    const bladeGrad=ctx.createLinearGradient(-4,0,4,0);
    bladeGrad.addColorStop(0,'#888');bladeGrad.addColorStop(0.5,'#ddd');bladeGrad.addColorStop(1,'#777');
    ctx.fillStyle=bladeGrad;
    ctx.beginPath();ctx.moveTo(-3,20);ctx.lineTo(3,20);ctx.lineTo(1,-60);ctx.lineTo(-1,-60);ctx.closePath();ctx.fill();
    // Fuller (groove in blade)
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=0.8;

    // Crossguard
    ctx.fillStyle='#c8a84b';ctx.fillRect(-14,16,28,6);
    ctx.fillStyle='#e8c86b';ctx.fillRect(-12,16,24,2);
    // Grip
    ctx.fillStyle='#4a2808';ctx.fillRect(-5,22,10,22);
    ctx.fillStyle='rgba(200,168,75,0.6)';

    pomGrad.addColorStop(0,'#e8c86b');pomGrad.addColorStop(1,'#8a6020');
    ctx.fillStyle=pomGrad;ctx.beginPath();ctx.arc(0,44,8,0,Math.PI*2);ctx.fill();

    // Neck/gorget

    // Helm bowl
    const helmGrad=ctx.createLinearGradient(-25,-40,25,-40);
    helmGrad.addColorStop(0,'#1a1a22');helmGrad.addColorStop(0.3,'#30304a');helmGrad.addColorStop(0.5,'#3d3d58');helmGrad.addColorStop(0.7,'#30304a');helmGrad.addColorStop(1,'#1a1a22');
    ctx.fillStyle=helmGrad;
    ctx.beginPath();ctx.arc(0,-18,26,Math.PI,0);ctx.fillRect(-26,-18,52,22);ctx.fill();
    // Visor/face plate
    ctx.fillStyle='#222235';
    ctx.fillRect(-22,-16,44,22);
    // Visor slit - glowing eyes effect
    const eyeGlow=ctx.createLinearGradient(-20,-8,20,-8);
    eyeGlow.addColorStop(0,'transparent');eyeGlow.addColorStop(0.2,'rgba(200,168,75,0.6)');eyeGlow.addColorStop(0.5,'rgba(200,168,75,0.9)');eyeGlow.addColorStop(0.8,'rgba(200,168,75,0.6)');eyeGlow.addColorStop(1,'transparent');
    ctx.fillStyle=eyeGlow;
    ctx.fillRect(-18,-10,36,5);
    ctx.fillStyle='rgba(200,168,75,0.3)';ctx.fillRect(-18,-13,36,2);
    // Noseguard
    ctx.fillStyle='#2a2a3a';ctx.fillRect(-2,-16,4,22);
    // Brow ridge
    ctx.fillStyle='#30304a';ctx.fillRect(-24,-16,48,5);
    ctx.fillStyle='#3d3d58';ctx.fillRect(-22,-16,44,2);
    // Cheekguards
    ctx.fillStyle='#252538';ctx.fillRect(-26,-12,6,18);ctx.fillRect(20,-12,6,18);
    // Plume
    const plumeX=Math.sin(t*1.2)*4;
    const plumeGrad=ctx.createLinearGradient(0,-44+plumeX,0,-60+plumeX);
    plumeGrad.addColorStop(0,'rgba(200,168,75,0.9)');plumeGrad.addColorStop(1,'rgba(200,168,75,0.1)');
    ctx.fillStyle=plumeGrad;
    for(let i=-2;i<=2;i++){
      ctx.beginPath();ctx.moveTo(i*2,-38);ctx.bezierCurveTo(i*3+plumeX,-48,i*4+plumeX*1.2,-55,i*2+plumeX,-62);
      ctx.bezierCurveTo(i*2+plumeX*1.2,-55,i+plumeX,-48,i,-38);
      ctx.fill();
    }
    // Helm ridge
    ctx.strokeStyle='rgba(200,168,75,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-44);ctx.lineTo(0,4);ctx.stroke();
    ctx.restore();

    ctx.restore();
  }

  function drawParticle(ctx,x,y,alpha){
    ctx.fillStyle=`rgba(200,168,75,${alpha})`;
    ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();
  }

  const particles=[];
  for(let i=0;i<40;i++){
    particles.push({x:Math.random()*2000,y:Math.random()*1000,vy:-(0.1+Math.random()*0.3),alpha:Math.random()*0.5+0.1,size:0.5+Math.random()*2});
  }

  function loop(ts){
    if(!document.getElementById('menu-canvas'))return;
    t=ts/1000;
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // Deep space background with stars
    ctx.fillStyle='#050508';
    ctx.fillRect(0,0,W,H);

    // Distant mountains / castle silhouette
    ctx.fillStyle='#080810';
    ctx.beginPath();ctx.moveTo(0,H);
    for(let x=0;x<=W;x+=80){
      const h=H*0.35+Math.sin(x*0.02+0.5)*H*0.12+Math.sin(x*0.008)*H*0.08;
      ctx.lineTo(x,h);
    }
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();

    // Fog layer
    const fog=ctx.createLinearGradient(0,H*0.5,0,H*0.85);
    fog.addColorStop(0,'transparent');fog.addColorStop(1,'rgba(10,10,20,0.6)');
    ctx.fillStyle=fog;ctx.fillRect(0,H*0.5,W,H*0.5);

    // Stars
    for(let i=0;i<80;i++){
      const sx=(i*137.5)%W, sy=(i*83.3)%H*0.6;
      const tw=Math.sin(t*0.5+i)*0.5+0.5;
      ctx.fillStyle=`rgba(255,255,255,${0.2+tw*0.5})`;
      ctx.beginPath();ctx.arc(sx,sy,0.8,0,Math.PI*2);ctx.fill();
    }

    // Moon
    const moonX=W*0.82,moonY=H*0.15;
    const moonGlow=ctx.createRadialGradient(moonX,moonY,0,moonX,moonY,80);
    moonGlow.addColorStop(0,'rgba(200,168,75,0.08)');moonGlow.addColorStop(1,'transparent');
    ctx.fillStyle=moonGlow;ctx.fillRect(moonX-80,moonY-80,160,160);
    ctx.fillStyle='rgba(240,220,150,0.9)';
    ctx.beginPath();ctx.arc(moonX,moonY,28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(220,200,120,0.4)';
    ctx.beginPath();ctx.arc(moonX-6,moonY-4,8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(moonX+8,moonY+6,5,0,Math.PI*2);ctx.fill();

    // Ambient particles (embers/dust)
    particles.forEach(p=>{
      p.y+=p.vy;p.x+=Math.sin(t+p.y*0.01)*0.3;
      if(p.y<0)p.y=H*0.8+Math.random()*H*0.2;
      ctx.fillStyle=`rgba(200,168,75,${p.alpha*(0.5+Math.sin(t*2+p.x)*0.5)})`;
      ctx.beginPath();ctx.arc(p.x%W,p.y,p.size,0,Math.PI*2);ctx.fill();
    });

    // Knight centered
    const kx=W*0.5, ky=H*0.5+40;
    const kscale=Math.min(W,H)/320;
    drawKnight(ctx,kx,ky,kscale*1.1,t);

    // Ground glow
    const groundGlow=ctx.createRadialGradient(kx,ky+kscale*100,0,kx,ky+kscale*100,kscale*120);
    groundGlow.addColorStop(0,'rgba(200,168,75,0.08)');groundGlow.addColorStop(1,'transparent');
    ctx.fillStyle=groundGlow;ctx.beginPath();ctx.ellipse(kx,ky+kscale*108,kscale*120,kscale*20,0,0,Math.PI*2);ctx.fill();

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

document.addEventListener('DOMContentLoaded',()=>{
  startMenuCanvas();
  let selectedCiv=null;
  const playBtn=document.getElementById('play-btn');
  const bonusText=document.getElementById('bonus-text');

  document.querySelectorAll('.civ-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.civ-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedCiv=btn.dataset.civ;
      bonusText.textContent=BONUS_TEXT[selectedCiv]||'';
      playBtn.disabled=false;
      SFX.play('menu_click');
    });
  });

  playBtn.addEventListener('click',()=>{
    if(!selectedCiv)return;
    SFX.play('build');
    document.getElementById('screen-menu').classList.add('hidden');
    const gameScreen=document.getElementById('screen-game');
    gameScreen.classList.add('active');
    setTimeout(()=>{
      G=new Game();
      G.start(selectedCiv);
    },50);
  });

  // "В МЕНЮ" button → open pause menu
  document.getElementById('btn-exit').addEventListener('click', () => {
    if(G) G._openIngameMenu();
  });

  // In-game menu controls
  document.getElementById('igm-resume').addEventListener('click',()=>{
    if(G) G._closeIngameMenu();
  });

  document.getElementById('igm-sound').addEventListener('click',()=>{
    SETTINGS.soundEnabled=!SETTINGS.soundEnabled;
    const btn=document.getElementById('igm-sound');
    if(SETTINGS.soundEnabled){
      btn.textContent='🔊 \u00a0 звук: вкл';
      btn.classList.remove('sound-off');btn.classList.add('sound-on');
    } else {
      btn.textContent='🔇 \u00a0 звук: выкл';
      btn.classList.remove('sound-on');btn.classList.add('sound-off');
    }
  });

  const sensSlider=document.getElementById('igm-sens');
  const sensVal=document.getElementById('sens-val');
  sensSlider.addEventListener('input',()=>{
    SETTINGS.scrollSensitivity=parseFloat(sensSlider.value);
    sensVal.textContent=SETTINGS.scrollSensitivity.toFixed(1);
  });

  document.getElementById('igm-mainmenu').addEventListener('click',()=>{
    if(G) G.stop();
    SETTINGS.isPaused=false;
    document.getElementById('ingame-menu').classList.add('hidden');
    document.getElementById('endscreen').classList.remove('show');
    document.getElementById('screen-game').classList.remove('active');
    document.getElementById('screen-menu').classList.remove('hidden');
    window.location.reload();
  });

  document.getElementById('end-btn') && document.getElementById('end-btn').addEventListener('click',()=>{
    window.location.reload();
  });
});
</script>
</body>
</html>
