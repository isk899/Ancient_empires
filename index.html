<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>Ancient Empires</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --panel:#111;
  --border:#222;
  --gold:#c8a84b;
  --text:#ddd;
  --muted:#666;
  --egypt:#d4aa20;
  --greece:#4a9ed4;
  --babylon:#8b5cd4;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;overflow:hidden;user-select:none}

/* ── МЕНЮ ── */
#screen-menu{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  background:#050508;
  overflow:hidden;
  transition:opacity .4s;
}
#menu-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
#menu-overlay{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 80%, rgba(200,168,75,0.06) 0%, transparent 65%),
             linear-gradient(to top, rgba(5,5,8,0.85) 0%, rgba(5,5,8,0.3) 50%, rgba(5,5,8,0.7) 100%);
  pointer-events:none;
}
#menu-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
}
#screen-menu.hidden{opacity:0;pointer-events:none}
.menu-logo{
  font-size:11px;letter-spacing:.6em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;
  text-shadow:0 0 20px rgba(200,168,75,0.3);
}
.menu-logo span{
  color:var(--gold);font-size:36px;display:block;
  letter-spacing:.2em;margin-bottom:8px;font-weight:200;
  text-shadow:0 0 40px rgba(200,168,75,0.5),0 0 80px rgba(200,168,75,0.2);
}
.menu-divider{
  width:200px;height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:20px 0 36px;opacity:0.5;
}
.civ-row{display:flex;gap:2px;margin-bottom:48px}
.civ-btn{
  width:120px;padding:14px 0;
  background:rgba(0,0,0,0.4);
  border:1px solid #1e1e1e;
  color:var(--muted);font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
  backdrop-filter:blur(4px);
}
.civ-btn .civ-accent{
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--c);transform:scaleX(0);transition:transform .2s;
}
.civ-btn:hover{background:rgba(255,255,255,0.04);color:#fff;border-color:#2a2a2a}
.civ-btn:hover .civ-accent{transform:scaleX(1)}
.civ-btn.selected{background:rgba(255,255,255,0.05);color:#fff;border-color:var(--c)}
.civ-btn.selected .civ-accent{transform:scaleX(1)}
.civ-btn .civ-icon{font-size:20px;display:block;margin-bottom:6px}
.civ-bonus-text{
  font-size:10px;color:var(--muted);text-align:center;
  min-height:24px;letter-spacing:.05em;line-height:1.5;
  margin-bottom:32px;transition:opacity .2s;
}
.play-btn{
  background:none;border:1px solid #2a2a2a;
  color:var(--muted);padding:12px 48px;
  font-size:11px;letter-spacing:.4em;text-transform:uppercase;
  cursor:pointer;transition:all .25s;
  backdrop-filter:blur(4px);
}
.play-btn:hover:not(:disabled){
  border-color:var(--gold);color:var(--gold);
  box-shadow:0 0 20px rgba(200,168,75,0.2);
}
.play-btn:disabled{opacity:.3;cursor:default}

/* ── ИГРА ── */
#screen-game{
  position:absolute;inset:0;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .4s;
  height:100%;overflow:hidden;
}
#screen-game.active{opacity:1;pointer-events:all}

/* HUD */
#hud{
  height:44px;background:#0d0d0d;border-bottom:1px solid #1a1a1a;
  display:flex;align-items:center;padding:0 12px;gap:0;flex-shrink:0;
  z-index:20;
}
.hud-civ{
  display:flex;align-items:center;gap:7px;
  padding-right:14px;margin-right:14px;
  border-right:1px solid #1a1a1a;
  font-size:10px;letter-spacing:.2em;color:var(--muted);
}
.hud-dot{width:6px;height:6px;border-radius:50%}
.hud-res{
  display:flex;align-items:center;gap:20px;flex:1;
}
.hud-r{display:flex;align-items:center;gap:5px;font-size:12px}
.hud-r .ico{font-size:14px}
.hud-r .lbl{font-size:9px;color:var(--muted);letter-spacing:.1em}
.hud-r .val{color:#e8dfc8;min-width:32px;font-variant-numeric:tabular-nums}
.hud-pop{
  margin-left:auto;padding-left:14px;border-left:1px solid #1a1a1a;
  font-size:10px;color:var(--muted);letter-spacing:.1em;
}
.hud-pop span{color:#e8dfc8}

/* TOOLTIP */
#tooltip{
  position:fixed;background:#111;border:1px solid #2a2a2a;
  padding:6px 10px;font-size:10px;color:#aaa;letter-spacing:.05em;
  pointer-events:none;display:none;z-index:100;max-width:180px;line-height:1.5;
}
/* DRAG SELECTION BOX */
#sel-box{
  position:fixed;border:1px solid rgba(100,220,100,0.8);
  background:rgba(100,220,100,0.08);pointer-events:none;
  display:none;z-index:50;
}

#build-hint{
  position:fixed;bottom:140px;left:50%;transform:translateX(-50%);
  background:#111;border:1px solid #333;padding:6px 14px;
  font-size:10px;color:#888;letter-spacing:.1em;display:none;z-index:30;
}

#game-canvas{display:block;flex:1;cursor:default;min-height:0;}

/* ── НИЖНЯЯ ПАНЕЛЬ — УЛУЧШЕННАЯ ── */
#bottom-panel{
  height:140px;background:#0d0d0d;border-top:1px solid #1a1a1a;
  display:flex;flex-shrink:0;z-index:20;
}
#sel-portrait{
  width:150px;border-right:1px solid #1a1a1a;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:#0a0a0a;position:relative;
}
#sel-portrait-label{
  position:absolute;bottom:5px;left:0;right:0;
  text-align:center;font-size:8px;letter-spacing:.12em;
  color:var(--muted);text-transform:uppercase;
}
#sel-info{
  flex:1;padding:10px 16px;font-size:11px;color:var(--muted);
  line-height:1.8;min-width:0;border-right:1px solid #111;
}
#sel-info .sel-name{
  font-size:13px;color:#e8dfc8;letter-spacing:.06em;
  margin-bottom:3px;display:block;
}
#sel-info .sel-hp-bar{
  width:100%;max-width:280px;height:4px;background:#1a1a1a;margin:4px 0 8px;border-radius:2px;
}
#sel-info .sel-hp-fill{height:4px;background:#4cde5a;transition:width .2s;border-radius:2px;}
#cmd-panel{
  width:230px;border-left:1px solid #1a1a1a;
  padding:8px;display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start;
  background:#0a0a0a;
}
.cmd-btn{
  width:60px;height:56px;background:#111;border:1px solid #1e1e1e;
  color:#888;font-size:9px;letter-spacing:.05em;text-align:center;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  transition:all .15s;border-radius:2px;
}
.cmd-btn .ico{font-size:18px}
.cmd-btn:hover{background:#181818;border-color:#333;color:#ddd}
.cmd-btn.active{border-color:var(--gold);color:var(--gold);background:#181400}

/* ── ИГРОВОЕ МЕНЮ (ПАУЗА) ── */
#ingame-menu{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.78);backdrop-filter:blur(10px);z-index:150;
}
#ingame-menu.hidden{display:none}
#ingame-menu-panel{
  background:#0d0d0d;border:1px solid #2a2a2a;padding:36px 52px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  min-width:340px;
  box-shadow:0 0 60px rgba(0,0,0,0.8);
}
#ingame-menu-panel h2{
  font-size:11px;letter-spacing:.6em;text-transform:uppercase;
  color:var(--muted);margin-bottom:16px;
}
.igm-btn{
  background:none;border:1px solid #2a2a2a;color:var(--muted);
  padding:11px 0;font-size:10px;letter-spacing:.35em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;width:100%;
}
.igm-btn:hover{border-color:var(--gold);color:var(--gold);box-shadow:0 0 16px rgba(200,168,75,.15);}
.igm-btn.sound-on{border-color:#2a3a2a;color:#4cde5a;}
.igm-btn.sound-off{border-color:#3a2020;color:#e84a4a;}
.igm-divider{width:100%;height:1px;background:linear-gradient(to right,transparent,#2a2a2a,transparent);margin:4px 0;}
.sens-row{width:100%;display:flex;flex-direction:column;gap:7px;}
.sens-row label{font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;display:flex;justify-content:space-between;}
.sens-row label span{color:#e8dfc8;}
.sens-row input[type=range]{
  width:100%;height:2px;appearance:none;-webkit-appearance:none;
  background:#222;outline:none;cursor:pointer;border-radius:2px;
}
.sens-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--gold);cursor:pointer;border:2px solid #0d0d0d;
}
.sens-row input[type=range]::-moz-range-thumb{
  width:12px;height:12px;border-radius:50%;background:var(--gold);
  cursor:pointer;border:2px solid #0d0d0d;
}

/* ── VICTORY / DEFEAT ── */
#endscreen{
  position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:24px;z-index:200;
  background:rgba(0,0,0,0.82);backdrop-filter:blur(6px);
}
#endscreen.show{display:flex;}
#end-title{
  font-size:52px;letter-spacing:.3em;font-weight:200;
  text-shadow:0 0 60px currentColor;
}
#end-title.victory{color:#c8a84b;}
#end-title.defeat{color:#e84a4a;}
#end-sub{font-size:11px;letter-spacing:.3em;color:var(--muted);margin-top:-10px;}
#end-btn{
  background:none;border:1px solid #2a2a2a;color:var(--muted);
  padding:11px 44px;font-size:11px;letter-spacing:.35em;text-transform:uppercase;
  cursor:pointer;transition:all .25s;margin-top:8px;
}
#end-btn:hover{border-color:var(--gold);color:var(--gold);box-shadow:0 0 20px rgba(200,168,75,.2);}
</style>
</head>
<body>

<!-- ══ МЕНЮ ══ -->
<div id="screen-menu">
  <canvas id="menu-canvas"></canvas>
  <div id="menu-overlay"></div>
  <div id="menu-content">
    <div class="menu-logo">
      <span>Ancient Empires</span>
      real-time strategy
    </div>
    <div class="menu-divider"></div>

    <div class="civ-row">
      <button class="civ-btn" data-civ="egypt" style="--c:var(--egypt)">
        <span class="civ-icon">𓂀</span>ЕГИПЕТ
        <div class="civ-accent"></div>
      </button>
      <button class="civ-btn" data-civ="greece" style="--c:var(--greece)">
        <span class="civ-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle"><ellipse cx="8" cy="12" rx="6" ry="8" stroke="currentColor" stroke-width="1.6" fill="none"/><line x1="8" y1="4" x2="8" y2="20" stroke="currentColor" stroke-width="1.2"/><line x1="2" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1"/><line x1="12" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><polygon points="12,1 14.5,5.5 9.5,5.5" fill="currentColor"/><rect x="11.2" y="20" width="1.6" height="3" rx="0.8" fill="currentColor"/></svg></span>ГРЕЦИЯ
        <div class="civ-accent"></div>
      </button>
      <button class="civ-btn" data-civ="babylon" style="--c:var(--babylon)">
        <span class="civ-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle"><rect x="1" y="19" width="22" height="4" rx="0.5"/><rect x="3" y="14" width="18" height="5" rx="0.5"/><rect x="5.5" y="9.5" width="13" height="4.5" rx="0.5"/><rect x="8" y="5.5" width="8" height="4" rx="0.5"/><rect x="10.5" y="2" width="3" height="3.5" rx="0.5"/></svg></span>ВАВИЛОН
        <div class="civ-accent"></div>
      </button>
    </div>

    <div class="civ-bonus-text" id="bonus-text">выберите цивилизацию</div>

    <button class="play-btn" id="play-btn" disabled>играть</button>
  </div>
</div>

<!-- ══ ИГРА ══ -->
<div id="screen-game">
  <div id="hud">
    <div class="hud-civ">
      <div class="hud-dot" id="hud-dot"></div>
      <span id="hud-civ-name">—</span>
    </div>
    <div class="hud-res">
      <div class="hud-r"><span class="ico">🪵</span><div><div class="lbl">ДЕРЕВО</div><div class="val" id="r-wood">200</div></div></div>
      <div class="hud-r"><span class="ico">🌾</span><div><div class="lbl">ПИЩА</div><div class="val" id="r-food">200</div></div></div>
      <div class="hud-r"><span class="ico">💰</span><div><div class="lbl">СУМЫ</div><div class="val" id="r-gold">100</div></div></div>
      <div class="hud-r"><span class="ico">🪨</span><div><div class="lbl">КАМЕНЬ</div><div class="val" id="r-stone">100</div></div></div>
    </div>
    <div class="hud-pop">НАСЕЛЕНИЕ&nbsp;<span id="p-cur">3</span>&nbsp;/&nbsp;<span id="p-max">5</span></div>
    <button id="btn-exit" class="play-btn" style="padding: 6px 16px; margin-left: 14px; font-size: 9px;">В МЕНЮ</button>
  </div>

  <canvas id="game-canvas"></canvas>

  <div id="bottom-panel">
    <div id="sel-portrait">
      <canvas id="portrait-canvas" width="100" height="100"></canvas>
      <div id="sel-portrait-label"></div>
    </div>
    <div id="sel-info">
      <span class="sel-name" id="sel-name">—</span>
      <div id="sel-hp-wrap" style="display:none">
        <div class="sel-hp-bar"><div class="sel-hp-fill" id="sel-hp-fill"></div></div>
      </div>
      <span id="sel-desc">Кликните на юнита или здание</span>
    </div>
    <div id="cmd-panel"></div>
  </div>
</div>

<div id="tooltip"></div>
<div id="sel-box"></div>
<div id="build-hint">Нажмите на карту для строительства &nbsp;|&nbsp; ESC — отмена</div>

<!-- ══ ИГРОВОЕ МЕНЮ (ПАУЗА) ══ -->
<div id="ingame-menu" class="hidden">
  <div id="ingame-menu-panel">
    <h2>меню</h2>
    <button class="igm-btn" id="igm-resume">▶ &nbsp; продолжить</button>
    <div class="igm-divider"></div>
    <button class="igm-btn sound-on" id="igm-sound">🔊 &nbsp; звук: вкл</button>
    <div class="sens-row">
      <label>чувствительность камеры <span id="sens-val">1.0</span></label>
      <input type="range" id="igm-sens" min="0.3" max="3.0" step="0.1" value="1.0">
    </div>
    <div class="igm-divider"></div>
    <button class="igm-btn" id="igm-mainmenu" style="color:#e84a4a;border-color:#3a1a1a;margin-top:4px;">⟵ &nbsp; главный экран</button>
  </div>
</div>
<div id="endscreen">
  <div id="end-title">—</div>
  <div id="end-sub">—</div>
  <button id="end-btn">В ГЛАВНОЕ МЕНЮ</button>
</div>

<script>
"use strict";

// ── НАСТРОЙКИ ИГРЫ ──
const SETTINGS = {
  soundEnabled: true,
  scrollSensitivity: 1.0,
  isPaused: false,
};

// ── SOUND SYSTEM ──
const SFX = (()=>{
  let ctx = null;
  function init(){
    if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended') ctx.resume();
  }
  function play(type){
    if(!SETTINGS.soundEnabled) return;
    try{
      init();
      const t=ctx.currentTime;
      const g=ctx.createGain();
      g.connect(ctx.destination);
      if(type==='select_unit'){
        // AoE style unit click - short positive chirp
        const o=ctx.createOscillator();
        o.connect(g);
        o.type='triangle';
        o.frequency.setValueAtTime(600,t);
        o.frequency.linearRampToValueAtTime(900,t+0.05);
        o.frequency.linearRampToValueAtTime(700,t+0.1);
        g.gain.setValueAtTime(0.18,t);
        g.gain.linearRampToValueAtTime(0,t+0.12);
        o.start(t);o.stop(t+0.13);
      } else if(type==='select_building'){
        // Stone thud + tone
        const o=ctx.createOscillator();
        const buf=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2)*0.3;
        const src=ctx.createBufferSource();
        src.buffer=buf;
        src.connect(g);
        o.connect(g);
        o.type='sine';
        o.frequency.setValueAtTime(220,t);
        o.frequency.linearRampToValueAtTime(180,t+0.08);
        g.gain.setValueAtTime(0.15,t);
        g.gain.linearRampToValueAtTime(0,t+0.1);
        o.start(t);o.stop(t+0.11);
        src.start(t);
      } else if(type==='select_resource'){
        // Rustling wood sound
        const buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5)*0.2;
        const src=ctx.createBufferSource();
        src.buffer=buf;
        const filt=ctx.createBiquadFilter();
        filt.type='bandpass';
        filt.frequency.value=800+Math.random()*400;
        filt.Q.value=2;
        src.connect(filt);filt.connect(g);
        g.gain.setValueAtTime(0.25,t);
        g.gain.linearRampToValueAtTime(0,t+0.15);
        src.start(t);
      } else if(type==='build'){
        // Hammer strike
        const o=ctx.createOscillator();
        o.connect(g);
        o.type='sawtooth';
        o.frequency.setValueAtTime(80,t);
        o.frequency.linearRampToValueAtTime(40,t+0.08);
        g.gain.setValueAtTime(0.2,t);
        g.gain.linearRampToValueAtTime(0,t+0.09);
        o.start(t);o.stop(t+0.1);
        // Metal ping
        const o2=ctx.createOscillator();
        o2.connect(g);
        o2.type='sine';
        o2.frequency.setValueAtTime(1200,t+0.02);
        o2.frequency.linearRampToValueAtTime(800,t+0.09);
        const g2=ctx.createGain();
        o2.connect(g2);g2.connect(ctx.destination);
        g2.gain.setValueAtTime(0.1,t+0.02);
        g2.gain.linearRampToValueAtTime(0,t+0.1);
        o2.start(t+0.02);o2.stop(t+0.11);
      } else if(type==='move'){
        // Short positive click
        const o=ctx.createOscillator();
        o.connect(g);
        o.type='sine';
        o.frequency.setValueAtTime(500,t);
        o.frequency.linearRampToValueAtTime(350,t+0.06);
        g.gain.setValueAtTime(0.1,t);
        g.gain.linearRampToValueAtTime(0,t+0.07);
        o.start(t);o.stop(t+0.08);
      } else if(type==='menu_click'){
        const o=ctx.createOscillator();
        o.connect(g);
        o.type='sine';
        o.frequency.setValueAtTime(400,t);
        o.frequency.linearRampToValueAtTime(600,t+0.08);
        g.gain.setValueAtTime(0.12,t);
        g.gain.linearRampToValueAtTime(0,t+0.1);
        o.start(t);o.stop(t+0.11);
      } else if(type==='hit'){
        // Weapon impact thud
        const buf=ctx.createBuffer(1,ctx.sampleRate*0.08,ctx.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.8)*0.35;
        const src=ctx.createBufferSource();
        src.buffer=buf;
        const filt=ctx.createBiquadFilter();
        filt.type='lowpass';filt.frequency.value=600;
        src.connect(filt);filt.connect(g);
        g.gain.setValueAtTime(0.3,t);g.gain.linearRampToValueAtTime(0,t+0.08);
        src.start(t);
      } else if(type==='victory'){
        // Fanfare
        [0,0.15,0.3,0.5].forEach((delay,i)=>{
          const o=ctx.createOscillator();const g2=ctx.createGain();
          o.connect(g2);g2.connect(ctx.destination);
          o.type='triangle';
          const freqs=[523,659,784,1047];
          o.frequency.setValueAtTime(freqs[i],t+delay);
          g2.gain.setValueAtTime(0.15,t+delay);g2.gain.linearRampToValueAtTime(0,t+delay+0.3);
          o.start(t+delay);o.stop(t+delay+0.35);
        });
      } else if(type==='defeat'){
        // Low descending tones
        [0,0.2,0.4].forEach((delay,i)=>{
          const o=ctx.createOscillator();const g2=ctx.createGain();
          o.connect(g2);g2.connect(ctx.destination);
          o.type='sine';
          const freqs=[300,220,150];
          o.frequency.setValueAtTime(freqs[i],t+delay);
          o.frequency.linearRampToValueAtTime(freqs[i]*0.8,t+delay+0.35);
          g2.gain.setValueAtTime(0.2,t+delay);g2.gain.linearRampToValueAtTime(0,t+delay+0.4);
          o.start(t+delay);o.stop(t+delay+0.45);
        });
      }
    }catch(e){}
  }
  return{play};
})();

class Resources {
  constructor(w=200,f=200,g=100,s=100){this.wood=w;this.food=f;this.gold=g;this.stone=s}
  add(t,v){this[t]=Math.max(0,(this[t]||0)+v)}

  }
  get cx(){return this.px+this.pw/2}
  get cy(){return this.py+this.ph/2}

// ЗДАНИЕ
class Building extends Entity {
  constructor(o){
    const def=BUILDING_DEFS[o.subtype];
    super({...o,type:'building',tw:def.w,th:def.h});
    this.def=def;
    this.maxHp=Math.round(def.hp*(o.hpMult||1));
    this.hp=this.maxHp;
    this.popProvided=def.pop;
    this.buildTimeLeft=def.buildTime*(o.buildSpeedMult?1/o.buildSpeedMult:1);
    this.ready=this.buildTimeLeft===0;
    this.worker=null;
    this.trainQueue=[];
    this.trainTimer=0;
    this._spawnCount=0;
  }
  get buildProgress(){return this.buildTimeLeft>0?1-this.buildTimeLeft/(this.def.buildTime||1):1}
  update(dt){
    if(!this.ready&&this.worker){
      this.buildTimeLeft=Math.max(0,this.buildTimeLeft-dt);
      if(this.buildTimeLeft===0){this.ready=true;this.worker=null;}
    }
    // Training queue
    if(this.ready&&this.trainQueue.length>0){
      this.trainTimer-=dt;
      if(this.trainTimer<=0){
        const spec=this.trainQueue.shift();
        this.trainTimer=this.trainQueue.length>0?spec.time:0;
        // Only player buildings spawn through this path (AI uses AI class spawn)
        if(G&&G.world&&this.owner==='player'){
          // Spread spawn positions around the building
          const spawnAngle=(this._spawnCount*(Math.PI*2/6));
          const spawnRadius=Math.max(this.pw,this.ph)*0.55+TILE*0.6;
          const spawnX=this.cx+Math.cos(spawnAngle)*spawnRadius-14;
          const spawnY=this.cy+Math.sin(spawnAngle)*spawnRadius-14;
          this._spawnCount++;
          let unit;
          if(spec.unitType==='warrior'){
            unit=new Warrior({x:Math.round(spawnX/TILE),y:Math.round(spawnY/TILE),speedMult:G.player.civ.speedMult,owner:'player'});
          } else {
            unit=new Unit({x:Math.round(spawnX/TILE),y:Math.round(spawnY/TILE),speedMult:G.player.civ.speedMult,buildSpeedMult:G.player.civ.buildSpeedMult,owner:'player'});
          }
          unit.px=spawnX;unit.py=spawnY;
          G.world.add(unit);
          G._calcPop();
        }
      }
    }
  }
}
